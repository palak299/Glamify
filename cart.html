<!DOCTYPE html>
<html>
<head>

<title>Empty Bag</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg, #fff0f5, #fde8f0, #fff5f8);
}


.header{
  display:flex;
  align-items:center;
  padding:18px 20px;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.back{
  font-size:24px;
  cursor:pointer;
  margin-right:12px;
}

.title{
  font-size:22px;
  font-weight:bold;
}


.container{
  height:calc(100vh - 70px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.bag{
  width:180px;
  height:180px;
  background: linear-gradient(135deg,#ffd6e7,#fbb1d3);
  border-radius:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:80px;
  margin-bottom:30px;
  box-shadow:0 10px 40px rgba(232,53,122,0.2);
}

h1{
  font-size:34px;
  margin-bottom:15px;
  line-height:1.3;
  color:#1a0012;
}

p{
  color:#6b4a5a;
  font-size:16px;
  margin-bottom:30px;
  max-width:300px;
}


button{
  background: linear-gradient(135deg,#e60073,#ff2d8d);
  color:white;
  border:none;
  padding:16px 40px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 8px 25px rgba(232,53,122,0.4);
}

button:hover{
  transform:translateY(-2px);
}

#theme-toggle {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9999;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: none;
  background: #e8357a;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(232, 53, 122, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s, background 0.3s;
}
#theme-toggle:hover {
  transform: scale(1.12) rotate(20deg);
}

html.dark {
  --pink:   #ff6fa5;
  --deep:   #ff4d8d;
  --light:  #2a0a1a;
  --cream:  #1a0010;
  --dark:   #f5e6ed;
  --muted:  #d4a0b8;
  --border: rgba(255, 111, 165, 0.2);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

html.dark body {
  background: #120009;
  color: #f0d8e8;
}

html.dark nav {
  background: rgba(18, 0, 9, 0.96);
  border-bottom: 1px solid rgba(255, 111, 165, 0.15);
}
html.dark .nav-link        { color: #d4a0b8; }
html.dark .nav-link:hover,
html.dark .nav-link.active { color: #ff6fa5; background: #2a0a1a; }
html.dark .logo            { color: #ff6fa5; }

html.dark .hero {
  background: linear-gradient(135deg, #1a0010 0%, #200015 50%, #180010 100%);
}
html.dark .hero h1       { color: #f0d8e8; }
html.dark .hero-desc     { color: #c090aa; }
html.dark .hero-tag      { background: #2a0a1a; border-color: rgba(255,111,165,0.2); }
html.dark .float-pill    { background: #2a0a1a; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
html.dark .fp-label      { color: #8a5070; }
html.dark .fp-sub        { color: #6a3050; }


html.dark .section,
html.dark section[style*="background:#fff"] {
  background: #180010 !important;
}
html.dark .bs-section     { background: #1a0010; }
html.dark .section-title  { color: #f0d8e8; }

html.dark .prod-card {
  background: #220015;
  border-color: rgba(255, 111, 165, 0.12);
}
html.dark .prod-card:hover {
  border-color: rgba(255, 111, 165, 0.35);
  box-shadow: 0 16px 44px rgba(0, 0, 0, 0.5);
}
html.dark .prod-name  { color: #f0d8e8; }
html.dark .prod-desc  { color: #8a5070; }
html.dark .prod-img   { background: #2a0a1a; }

html.dark .cat-card {
  box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5);
}

html.dark .acard {
  background: #220015;
  border-color: rgba(255, 111, 165, 0.1);
}
html.dark .acard p { color: #c090aa; }

html.dark .vcard {
  background: #2a0a1a;
}
html.dark .vcard p { color: #c090aa; }

html.dark .reviews-section {
  background: linear-gradient(135deg, #180010, #200015);
}
html.dark .review-card {
  background: #220015;
  border-color: rgba(255, 111, 165, 0.12);
}
html.dark .review-card.featured {
  background: linear-gradient(135deg, #2a0a1a, #400025);
}
html.dark .review-text   { color: #c090aa; }
html.dark .review-name   { color: #f0d8e8; }


html.dark .about-top {
  background: linear-gradient(135deg, #180010, #220015);
}
html.dark .about-top h1 { color: #f0d8e8; }
html.dark .about-top p  { color: #c090aa; }

html.dark .contact-page {
  background: linear-gradient(135deg, #180010, #200015);
}
html.dark .contact-box {
  background: #220015;
  border-color: rgba(255, 111, 165, 0.1);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}
html.dark .contact-box h1   { color: #f0d8e8; }
html.dark .contact-sub      { color: #c090aa; }
html.dark .form-field input,
html.dark .form-field textarea {
  background: #2a0a1a;
  border-color: rgba(255,111,165,0.2);
  color: #f0d8e8;
}
html.dark .form-field input::placeholder,
html.dark .form-field textarea::placeholder { color: #6a3050; }
html.dark .form-field input:focus,
html.dark .form-field textarea:focus {
  background: #300018;
  border-color: #ff6fa5;
}
html.dark .ci-card {
  background: #2a0a1a;
}
html.dark .ci-card h4 { color: #ff6fa5; }
html.dark .ci-card p  { color: #c090aa; }


html.dark .shop-top {
  background: linear-gradient(135deg, #180010, #220015);
}
html.dark .shop-top h1  { color: #f0d8e8; }
html.dark .shop-top p   { color: #c090aa; }
html.dark .shop-cat-title { color: #f0d8e8; border-color: #2a0a1a; }
html.dark .filt {
  background: #220015;
  color: #c090aa;
  border-color: rgba(255,111,165,0.2);
}
html.dark .filt:hover { color: #ff6fa5; border-color: #ff6fa5; }
html.dark .filt.on    { background: #ff6fa5; color: white; border-color: #ff6fa5; }

html.dark .cart-page h1    { color: #f0d8e8; }
html.dark .cart-item {
  background: #220015;
  border-color: rgba(255,111,165,0.1);
}
html.dark .ci-name   { color: #f0d8e8; }
html.dark .ci-price  { color: #c090aa; }
html.dark #cart-summary {
  background: #220015;
  border-color: rgba(255,111,165,0.1);
}
html.dark .timer-banner { background: linear-gradient(135deg,#2a0a1a,#400025); }
html.dark .promo-input {
  background: #2a0a1a; color: #f0d8e8;
  border-color: rgba(255,111,165,0.2);
}

html.dark .wish-page h1 { color: #f0d8e8; }
html.dark .card {
  background: #220015;
  border-color: rgba(255,111,165,0.1);
}
html.dark .name { color: #f0d8e8; }


html.dark .faq-section { background: linear-gradient(135deg,#180010,#220015); }
html.dark .faq-item    { background: #220015; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
html.dark .faq-question { color: #f0d8e8; }
html.dark .faq-answer  { color: #c090aa; }


html.dark footer { background: #0a0006; }


html.dark .perks { background: #180010; border-color: rgba(255,111,165,0.1); }
html.dark .perk  { border-color: rgba(255,111,165,0.1); }
html.dark .perk-text h4 { color: #f0d8e8; }
html.dark .perk-text p  { color: #c090aa; }


html.dark .search-box   { background: #220015; }
html.dark #search-inp   { background: #2a0a1a; color: #f0d8e8; border-color: rgba(255,111,165,0.2); }
html.dark .sr-card      { background: #2a0a1a; border-color: rgba(255,111,165,0.15); }
html.dark .sr-name      { color: #f0d8e8; }


html.dark .login-container,
html.dark .container {
  background: #220015;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
html.dark .login-container h2,
html.dark .container h1 { color: #f0d8e8; }
html.dark .login-container input,
html.dark .container input,
html.dark .container select,
html.dark .container textarea {
  background: #2a0a1a;
  border-color: rgba(255,111,165,0.2);
  color: #f0d8e8;
}
html.dark .container label { color: #c090aa; }


html.dark .question-card  { background: #220015; }
html.dark .question-card h3 { color: #f0d8e8; }
html.dark .options label  { border-color: rgba(255,111,165,0.2); color: #c090aa; }
html.dark .options label:hover { background: #2a0a1a; }
html.dark .result-box     { background: #220015; color: #f0d8e8; }

body, nav, .prod-card, .acard, .vcard, .review-card,
.faq-item, .cart-item, .card, .contact-box, .search-box,
.ci-card, .filt, footer, .perks, .perk {
  transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}
</style>
</head>

<body>
<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <div class="title">Bag</div>
</div>


<div class="container">

  <div class="bag">🛍️</div>
  <h1>Your Shopping<br>Bag is Empty</h1>
  <p>This feels too light! Go on, add all your favourites</p>
  <button id="shopBtn">Start Shopping</button>

<script>
document.getElementById("shopBtn").addEventListener("click", function(){
  window.location.href = "index.html";
});
</script>

  
</div>

</body>
<script src="cart.js"></script>
</html>
